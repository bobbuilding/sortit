<input class="w-full bg-[#1A1A1A] border border-[#1E1E1E] text-on-surface font-body-main text-body-main px-sm py-sm focus:border-primary-container focus:ring-0 transition-colors rounded-none outline-none" id="email" placeholder="user@institution.com" required="" type="email"/>
</div>
<div>

</div>
<input class="w-full bg-[#1A1A1A] border border-[#1E1E1E] text-on-surface font-body-main text-body-main px-sm py-sm focus:border-primary-container focus:ring-0 transition-colors rounded-none outline-none" id="password" placeholder="••••••••" required="" type="password"/>
</div>
